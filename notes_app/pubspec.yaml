name: notes_app
description: "Lumina Notes — A beautiful, feature-rich note-taking app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.5
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  go_router: ^17.2.3
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  flutter_local_notifications: ^21.0.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  image_picker: ^1.2.2
  fl_chart: ^1.2.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
